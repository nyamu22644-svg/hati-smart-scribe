<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- Primary Meta Tags -->
    <title>HATI | Your Life. Certified.</title>
    <meta name="title" content="HATI">
    <meta name="description" content="Your Life Certified - Privacy-First Health Vault. The secure, encrypted vault for your family's medical history.">
    
    <!-- PWA & App Icons -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0A192F">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HATI">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg">
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192x192.svg">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.svg">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.svg">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.svg">
    
    <!-- Custom Styles -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap');
      :root {
        --brand-navy: #0A192F;
        --brand-gold: #D4AF37;
        --brand-crimson: #8D0B0B;
        --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
      }

      body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
      .font-serif { font-family: 'Playfair Display', serif; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      
      .bg-navy { background-color: var(--brand-navy); }
      .text-navy { color: var(--brand-navy); }
      .bg-gold { background-color: var(--brand-gold); }
      .text-gold { color: var(--brand-gold); }
      .bg-gold-premium { background: var(--gold-gradient); }
      .border-gold { border-color: var(--brand-gold); }
      .bg-crimson { background-color: var(--brand-crimson); }
      .text-crimson { color: var(--brand-crimson); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Register Service Worker for PWA installation
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(() => {
            console.log('✅ Service Worker registered for HATI PWA');
          }).catch((error) => {
            console.log('⚠️ Service Worker registration failed:', error);
          });
        });
      }
    </script>
</body>
</html>
