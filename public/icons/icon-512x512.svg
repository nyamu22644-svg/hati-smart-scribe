<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shield-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A192F;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a3a5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A192F;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Outer shield/hexagon background -->
  <polygon points="256,20 450,100 480,300 400,460 100,460 20,300 50,100" fill="url(#shield-gradient)" stroke="#D4AF37" stroke-width="8"/>
  
  <!-- Inner border -->
  <polygon points="256,50 420,115 445,290 380,430 140,430 75,290 100,115" fill="none" stroke="#D4AF37" stroke-width="6"/>
  
  <!-- Center glow circle -->
  <circle cx="256" cy="260" r="140" fill="url(#center-glow)"/>
  
  <!-- Main text HATI -->
  <text x="256" y="290" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="12" filter="url(#shadow)">HATI</text>
  
  <!-- Decorative military bars -->
  <g stroke="#D4AF37" stroke-width="4" fill="none">
    <!-- Top bar -->
    <line x1="180" y1="100" x2="332" y2="100"/>
    <!-- Bottom bar -->
    <line x1="180" y1="420" x2="332" y2="420"/>
    <!-- Left accent -->
    <line x1="80" y1="240" x2="140" y2="280"/>
    <!-- Right accent -->
    <line x1="432" y1="240" x2="372" y2="280"/>
  </g>
  
  <!-- Corner stars/diamonds -->
  <g fill="#D4AF37">
    <circle cx="100" cy="100" r="8"/>
    <circle cx="412" cy="100" r="8"/>
    <circle cx="100" cy="420" r="8"/>
    <circle cx="412" cy="420" r="8"/>
  </g>
  
  <!-- Shadow filter definition -->
  <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.4"/>
  </filter>
</svg>